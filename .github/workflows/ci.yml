name: CI
run-name: "${{ github.event.head_commit.message || github.event.pull_request.title || github.event_name }}"

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  formatting:
    name: Проверка форматирования (clang-format)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install clang-format
        run: sudo apt-get install -y clang-format-14

      - name: Check formatting
        run: |
          find . -name "*.cpp" -o -name "*.h" | xargs clang-format-14 --dry-run --Werror

  build-and-test:
    name: ${{ matrix.compiler }} (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    needs: formatting
    strategy:
      matrix:
        build_type: [Debug, Release]
        compiler: [gcc, clang]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure -C ${{ matrix.build_type }}